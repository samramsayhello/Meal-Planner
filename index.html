<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Plan">
<meta name="mobile-web-app-capable" content="yes">
<title>Meal Plan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF7F2;--white:#fff;--charcoal:#1E1E1E;--mid:#666;--light:#AAA;
  --sage:#4F7A62;--sage-lt:#E6F4EC;--terra:#C17A55;--terra-lt:#FEF3E2;
  --navy:#1A3A5C;--bs:0 2px 12px rgba(0,0,0,.07);
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--charcoal);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px;
  overscroll-behavior:none;-webkit-text-size-adjust:100%}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg)}

/* TOP BAR */
.topbar{background:var(--charcoal);padding:12px 16px 10px;padding-top:calc(12px + env(safe-area-inset-top,0px));
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.brand{font-family:Georgia,serif;font-size:16px;color:#fff}
.week-selector{display:flex;align-items:center;gap:6px}
.week-arrow{background:rgba(255,255,255,.12);border:none;color:#fff;width:26px;height:26px;
  border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.week-label{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;text-align:center;min-width:90px}
.week-sub{font-size:9px;color:rgba(255,255,255,.4);display:block;font-weight:400}

/* TABS */
.content{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:var(--bg)}
.tab-panel.active{display:block}
.bottomnav{flex-shrink:0;background:#fff;border-top:1px solid #EDE8E0;display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.navbtn{flex:1;border:none;background:transparent;cursor:pointer;padding:10px 2px 8px;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.navbtn .ni{font-size:18px;opacity:.4;transition:opacity .15s}
.navbtn .nl{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--light)}
.navbtn .nd{width:18px;height:2px;border-radius:1px;background:var(--terra);margin-top:2px;display:none}
.navbtn.active .ni{opacity:1}
.navbtn.active .nl{color:var(--terra)}
.navbtn.active .nd{display:block}

/* SHARED */
.section-title{font-family:Georgia,serif;font-size:20px;color:var(--charcoal)}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--light)}
.sticky-hdr{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #F0EAE0}
.pill{display:inline-block;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.1em;
  padding:4px 11px;cursor:pointer;border:1.5px solid;white-space:nowrap;transition:all .15s}

/* PLAN TAB */
.day-strip{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #EDE8E0;-webkit-overflow-scrolling:touch}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex:0 0 calc(100%/7);border:none;background:transparent;cursor:pointer;padding:10px 2px 0;border-bottom:3px solid transparent;transition:all .15s}
.day-btn.active{background:var(--charcoal);border-bottom-color:var(--terra)}
.day-btn .dn{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--light)}
.day-btn.active .dn{color:#fff}
.day-btn .dot{width:6px;height:6px;border-radius:50%;margin:4px auto 6px;background:#DDD}
.day-btn .dot.ok{background:var(--sage)}
.day-btn .dot.warn{background:var(--terra)}
.day-hdr{padding:14px 16px 10px;background:#fff;border-bottom:1px solid #F0EAE0}
.macro-bars{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.mbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--mid);margin-bottom:4px}
.mbar-track{height:5px;background:#EDE8E0;border-radius:3px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px;transition:width .4s}
.slots{padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:80px}
.slot-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.04)}
.slot-lbl{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 7px}
.slot-lbl-left{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#CCC}
.slot-change{font-size:11px;color:var(--mid);border:1px solid #E8E0D8;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer}
.slot-meal{padding:10px 14px 12px;cursor:pointer;display:flex;gap:10px;align-items:center}
.slot-meal.auto{background:#F0F8F4}
.slot-meal-name{font-size:14px;font-weight:600;color:var(--charcoal);line-height:1.3}
.slot-meal-name.auto{color:var(--sage);font-style:italic}
.slot-meal-macro{font-size:11px;color:var(--light);margin-top:2px}
.slot-empty{padding:12px 14px;color:#CCC;font-style:italic;font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}

/* RECIPES */
.search-bar{width:100%;padding:10px 14px;border:1px solid #E0DAD0;border-radius:10px;font-size:15px;outline:none;box-sizing:border-box;background:#fff}
.cat-pills{display:flex;gap:6px;overflow-x:auto;padding:0 0 2px;-webkit-overflow-scrolling:touch}
.cat-pills::-webkit-scrollbar{display:none}
.recipe-list{padding-bottom:80px}
.recipe-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #F5F0E8;cursor:pointer;background:#fff}
.recipe-item:active{background:#F8F5F0}
.recipe-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.recipe-item-name{font-size:14px;font-weight:600;color:var(--charcoal);line-height:1.25;margin-bottom:3px}
.recipe-item-meta{display:flex;gap:6px;align-items:center}
.recipe-cat-badge{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
.recipe-chevron{color:#CCC;font-size:20px;flex-shrink:0}

/* SHOPPING */
.progress-bar{height:6px;background:#EDE8E0;border-radius:3px;overflow:hidden;flex:1}
.progress-fill{height:100%;background:var(--sage);border-radius:3px;transition:width .3s}
.cat-header{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--light);padding:16px 4px 8px;border-bottom:2px solid #EDE8E0;margin-bottom:4px}
.shop-item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid #F5F0E8;cursor:pointer;transition:opacity .2s}
.shop-item.checked{opacity:.45}
.shop-cb{width:22px;height:22px;border-radius:5px;border:2px solid #CCC;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.shop-cb.checked{background:var(--sage);border-color:var(--sage)}
.shop-name{flex:1;font-size:15px;font-weight:500;color:var(--charcoal)}
.shop-item.checked .shop-name{text-decoration:line-through}
.qty-pill{font-size:11px;font-weight:700;color:#777;background:#F0EBE3;padding:3px 9px;border-radius:6px;flex-shrink:0}

/* PREP */
.prep-section{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:var(--bs);border:1px solid rgba(0,0,0,.04)}
.prep-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.prep-hdr-left{display:flex;align-items:center;gap:10px}
.prep-hdr-title{font-family:Georgia,serif;font-size:16px;color:#fff}
.prep-time{font-size:10px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.12);padding:3px 10px;border-radius:12px}
.prep-body{padding:4px 16px 10px}
.prep-step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #F5F0E8}
.prep-step:last-child{border-bottom:none}
.step-num{width:26px;height:26px;border-radius:13px;background:var(--charcoal);color:#fff;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-num.hi{background:var(--terra)}
.step-title{font-size:13px;font-weight:700;color:var(--charcoal);margin-bottom:3px}
.step-detail{font-size:12px;color:var(--mid);line-height:1.6}
.golden-rule{background:var(--charcoal);border-radius:14px;padding:18px;margin-bottom:14px}
.golden-rule p{font-family:Georgia,serif;font-size:15px;color:#fff;line-height:1.55}
.tip-box{background:var(--terra-lt);border:1px solid #F0D0A0;border-radius:10px;padding:11px 14px;margin:8px 0 4px;font-size:12px;color:#7A4020;line-height:1.6}
.dinner-item{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F5F0E8}
.dinner-item:last-child{border-bottom:none}
.dinner-note{font-size:11px;color:var(--terra);font-weight:600;margin-top:3px}

/* SHEETS */
.sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;max-height:92vh;background:#fff;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:#DDD;margin:10px auto 0;flex-shrink:0}
.sheet-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sheet-sticky{position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid #F0EAE0;padding:10px 16px;flex-shrink:0}
.recipe-hero{padding:20px 20px 16px;text-align:center}
.recipe-emoji-big{font-size:56px;display:block;margin-bottom:8px}
.recipe-h2{font-family:Georgia,serif;font-size:22px;margin-bottom:8px;line-height:1.2}
.recipe-desc{font-size:13px;color:var(--mid);line-height:1.65}
.macro-chips{display:flex;gap:10px;margin:16px 0 0}
.macro-chip{flex:1;border-radius:10px;padding:12px 8px;text-align:center}
.macro-chip-val{font-family:Georgia,serif;font-size:20px;line-height:1}
.macro-chip-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-top:3px}
.ing-row{display:flex;align-items:baseline;gap:8px;padding:9px 0;border-bottom:1px solid #F5F0E8;font-size:14px;color:#444}
.ing-bullet{color:var(--sage);font-weight:700;font-size:16px;line-height:.8;flex-shrink:0}
.method-step{display:flex;gap:12px;margin-bottom:12px;font-size:13px;color:var(--mid);line-height:1.65}
.method-num{font-family:Georgia,serif;font-size:20px;flex-shrink:0;width:22px;line-height:1;margin-top:1px}

/* WEEK VIEW */
.week-grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 80px}
.week-grid-wrap::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">🍽 Sam &amp; Luisa</div>
    <div class="week-selector">
      <button class="week-arrow" id="btn-prev-week" onclick="changeWeek(-1)">&#8249;</button>
      <div class="week-label" id="week-label-top">
        Week 1<span class="week-sub" id="week-date-top"></span>
      </div>
      <button class="week-arrow" id="btn-next-week" onclick="changeWeek(1)">&#8250;</button>
    </div>
  </div>

  <div class="content">
    <div id="tab-week" class="tab-panel">
      <div class="sticky-hdr" style="padding:12px 16px 10px">
        <div class="section-title" id="week-cal-title">Week at a Glance</div>
        <div class="eyebrow" style="margin-top:3px" id="week-cal-sub"></div>
      </div>
      <div class="week-grid-wrap" id="week-cal"></div>
    </div>

    <div id="tab-plan" class="tab-panel active">
      <div class="sticky-hdr">
        <div class="day-strip" id="day-strip"></div>
        <div class="day-hdr" id="day-hdr"></div>
      </div>
      <div class="slots" id="slots"></div>
    </div>

    <div id="tab-recipes" class="tab-panel">
      <div class="sticky-hdr" style="padding:12px 14px 10px">
        <input class="search-bar" id="recipe-search" placeholder="Search recipes…" oninput="renderRecipes()">
        <div class="cat-pills" id="cat-pills" style="margin-top:8px"></div>
      </div>
      <div class="recipe-list" id="recipe-list"></div>
    </div>

    <div id="tab-shopping" class="tab-panel">
      <div class="sticky-hdr" style="padding:14px 16px 12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div class="section-title">Shopping List</div>
            <div id="shop-count" class="eyebrow" style="margin-top:2px"></div>
          </div>
          <button onclick="clearChecked()" style="padding:7px 12px;border:1px solid #E0DAD0;border-radius:8px;background:#fff;font-size:12px;color:var(--mid);cursor:pointer">&#8635; Reset</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="progress-bar"><div class="progress-fill" id="shop-progress"></div></div>
          <span id="shop-progress-txt" style="font-size:11px;color:var(--light);white-space:nowrap"></span>
        </div>
      </div>
      <div style="margin:10px 14px 0;padding:10px 12px;background:var(--terra-lt);border:1px solid #F0D0A0;border-radius:10px;font-size:12px;color:#7A4020;line-height:1.55">
        &#x1F6D2; <strong>Pak'nSave tip:</strong> Rice 5kg ~$8.50 &middot; Oats 1kg ~$3.50 &middot; Chicken ~$13/kg &middot; Mince ~$18.99/kg &middot; Eggs ~$9.59/doz
      </div>
      <div id="shop-list" style="padding:0 14px 80px"></div>
    </div>

    <div id="tab-prep" class="tab-panel">
      <div class="sticky-hdr" style="padding:14px 16px 10px">
        <div class="section-title">Meal Prep Guide</div>
        <div class="eyebrow" style="margin-top:3px">Based on this week's selected meals</div>
      </div>
      <div id="prep-content" style="padding:14px 14px 80px"></div>
    </div>
  </div>

  <div class="bottomnav">
    <button class="navbtn" id="nav-week" onclick="switchTab('week')">
      <span class="ni">&#x1F5D3;</span><span class="nl">Week</span><span class="nd"></span>
    </button>
    <button class="navbtn active" id="nav-plan" onclick="switchTab('plan')">
      <span class="ni">&#x1F4C5;</span><span class="nl">Plan</span><span class="nd"></span>
    </button>
    <button class="navbtn" id="nav-recipes" onclick="switchTab('recipes')">
      <span class="ni">&#x1F4D6;</span><span class="nl">Recipes</span><span class="nd"></span>
    </button>
    <button class="navbtn" id="nav-shopping" onclick="switchTab('shopping')">
      <span class="ni">&#x1F6D2;</span><span class="nl" id="shop-nav-lbl">Shop</span><span class="nd"></span>
    </button>
    <button class="navbtn" id="nav-prep" onclick="switchTab('prep')">
      <span class="ni">&#x1F9D1;&#x200D;&#x1F373;</span><span class="nl">Prep</span><span class="nd"></span>
    </button>
  </div>
</div>

<!-- Recipe Sheet -->
<div class="sheet-overlay" id="recipe-sheet-overlay" onclick="closeRecipeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-sticky" id="recipe-sheet-header"></div>
    <div class="sheet-scroll" id="recipe-sheet-body"></div>
  </div>
</div>

<!-- Meal Picker Sheet -->
<div class="sheet-overlay" id="picker-overlay" onclick="closePicker(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-sticky">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <button onclick="closePicker()" style="background:rgba(0,0,0,.07);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#8249;</button>
        <div>
          <div id="picker-title" style="font-family:Georgia,serif;font-size:17px;line-height:1.2"></div>
          <div id="picker-day" style="font-size:11px;color:var(--light)"></div>
        </div>
      </div>
      <input class="search-bar" id="picker-search" placeholder="Search meals…" oninput="renderPickerList()">
      <div class="cat-pills" id="picker-pills" style="margin-top:8px"></div>
    </div>
    <div class="sheet-scroll" id="picker-list"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// WEEK CONFIG — 26 weeks from Mon 5 May 2025
// ═══════════════════════════════════════════════════════
var WEEK_START_MS = new Date("2025-05-05T00:00:00").getTime(); // Mon 5 May
var TOTAL_WEEKS   = 26;

function weekStartDate(weekNum) {
  // weekNum is 1-based
  return new Date(WEEK_START_MS + (weekNum - 1) * 7 * 24 * 60 * 60 * 1000);
}

function formatWeekDate(weekNum) {
  var d = weekStartDate(weekNum);
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return "Mon " + d.getDate() + " " + months[d.getMonth()];
}

function weekPlanKey(weekNum) {
  return "mp_plan_w" + weekNum;
}

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
var DAYS  = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var SLOTS = ["Breakfast","Snack","Lunch","Dinner","Snack 2","Eve Snack"];
var SLOT_EMOJI = {Breakfast:"🌅",Snack:"🍎",Lunch:"🥗",Dinner:"🍽","Snack 2":"🥜","Eve Snack":"🌙"};
var CATEGORIES = ["All","Breakfast","Smoothie","Lunch","Dinner","Snack"];

var PANTRY_STAPLES = [
  {name:"Mixed nuts", qty:400, unit:"g", cat:"🥜 Nuts"},
  {name:"Nut bars", qty:4, unit:"", cat:"🥜 Nuts"},

  {name:"Rice cakes", qty:1, unit:"pack", cat:"🍚 Carbs"},
  {name:"Medjool dates", qty:6, unit:"", cat:"🍌 Fruit"},
];
var AUTO_LUNCH = {Monday:"Sunday",Tuesday:"Monday",Wednesday:"Tuesday",Thursday:"Wednesday",Friday:"Thursday"};
var FREE_SLOTS = {Saturday:["Lunch","Dinner"],Sunday:["Lunch"]};

var CAT_COLOR = {
  Breakfast:{bg:"#FEF3E2",accent:"#C17A55"},
  Smoothie: {bg:"#E6F4EC",accent:"#4F7A62"},

var DEFAULT_PLAN = {
  Monday:    {Breakfast:"Classic Overnight Oats",  Snack:"",             Lunch:"",Dinner:"Garlic Chicken & Rice",          "Snack 2":"","Eve Snack":"Greek Yoghurt + Berries"},
  Tuesday:   {Breakfast:"Berry Overnight Oats",    Snack:"Protein Shake",Lunch:"",Dinner:"Beef Mince Stir Fry & Rice",     "Snack 2":"","Eve Snack":"Cottage Cheese + Rice Cakes"},
  Wednesday: {Breakfast:"Scrambled Eggs on Toast", Snack:"",             Lunch:"",Dinner:"Chicken Pasta Bake",             "Snack 2":"","Eve Snack":"Choc Dessert Smoothie"},
  Thursday:  {Breakfast:"Chocolate Overnight Oats",Snack:"Protein Shake",Lunch:"",Dinner:"Rump Steak & Roast Potatoes",   "Snack 2":"","Eve Snack":"Greek Yoghurt + Honey + Walnuts"},
  Friday:    {Breakfast:"Honey Almond Overnight Oats",Snack:"",          Lunch:"",Dinner:"Chicken Wraps (Dinner)",         "Snack 2":"","Eve Snack":"Choc Dessert Smoothie"},
  Saturday:  {Breakfast:"Banana Protein Smoothie", Snack:"Banana",       Lunch:"",Dinner:"",                               "Snack 2":"","Eve Snack":"Protein Shake"},
  Sunday:    {Breakfast:"Poached Eggs on Toast",   Snack:"Boiled Eggs ×2",Lunch:"",Dinner:"Lemon Herb Chicken & Potatoes","Snack 2":"","Eve Snack":"Greek Yoghurt + Berries"},
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
var state = {
  tab: "plan",
  activeDay: 0,
  recCat: "All",
  recSearch: "",
  pickerCat: "All",
  pickerDay: null,
  pickerSlot: null,
  currentWeek: 1,
  checked: {},
  plans: {},  // keyed by week number
};

// Load persisted state
try {
  var sw = parseInt(localStorage.getItem("mp_currentWeek") || "1");
  state.currentWeek = (sw >= 1 && sw <= TOTAL_WEEKS) ? sw : 1;
} catch(e) { state.currentWeek = 1; }

try { state.checked = JSON.parse(localStorage.getItem("mp_checked")) || {}; } catch(e) {}

// Load all saved week plans
for (var w = 1; w <= TOTAL_WEEKS; w++) {
  try {
    var saved = localStorage.getItem(weekPlanKey(w));
    state.plans[w] = saved ? JSON.parse(saved) : null;
  } catch(e) { state.plans[w] = null; }
}

function getCurrentPlan() {
  var wk = state.currentWeek;
  if (!state.plans[wk]) {
    // Week 1 starts with default, all others start blank
    if (wk === 1) {
      state.plans[wk] = JSON.parse(JSON.stringify(DEFAULT_PLAN));
    } else {
      state.plans[wk] = {
        Monday:    {Breakfast:"",Snack:"",Lunch:"",Dinner:"","Snack 2":"","Eve Snack":""},
        Tuesday:   {Breakfast:"",Snack:"",Lunch:"",Dinner:"","Snack 2":"","Eve Snack":""},
        Wednesday: {Breakfast:"",Snack:"",Lunch:"",Dinner:"","Snack 2":"","Eve Snack":""},
        Thursday:  {Breakfast:"",Snack:"",Lunch:"",Dinner:"","Snack 2":"","Eve Snack":""},
        Friday:    {Breakfast:"",Snack:"",Lunch:"",Dinner:"","Snack 2":"","Eve Snack":""},
        Saturday:  {Breakfast:"",Snack:"",Lunch:"",Dinner:"","Snack 2":"","Eve Snack":""},
        Sunday:    {Breakfast:"",Snack:"",Lunch:"",Dinner:"","Snack 2":"","Eve Snack":""},
      };
    }
  }
  return state.plans[wk];
}

function save() {
  var wk = state.currentWeek;
  localStorage.setItem(weekPlanKey(wk), JSON.stringify(state.plans[wk]));
  localStorage.setItem("mp_currentWeek", String(wk));
  localStorage.setItem("mp_checked", JSON.stringify(state.checked));
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getMeal(name) {
  for (var i = 0; i < MEALS.length; i++) { if (MEALS[i].name === name) return MEALS[i]; }
  return null;
}

function getDisplayPlan() {
  var plan = getCurrentPlan();
  var p = JSON.parse(JSON.stringify(plan));
  Object.keys(AUTO_LUNCH).forEach(function(day) {
    var prev = AUTO_LUNCH[day];
    var d = plan[prev] && plan[prev].Dinner;
    p[day].Lunch = d ? "\u2190 " + d : "";
  });
  return p;
}

function getMacrosForPerson(mealName, person) {
  var real = (mealName && mealName.indexOf("\u2190 ") === 0) ? mealName.slice(2) : mealName;
  var m = getMeal(real);
  if (!m) return {cal:0, prot:0};
  return person === "Sam" ? {cal:m.calM, prot:m.protM} : {cal:m.calF, prot:m.protF};
}

function getDayMacrosBoth(day) {
  var dp = getDisplayPlan();
  var freeSlots = FREE_SLOTS[day] || [];
  var samCal=0, samProt=0, luisaCal=0, luisaProt=0;
  Object.keys(dp[day] || {}).forEach(function(slot) {
    if (freeSlots.indexOf(slot) >= 0) return;
    var name = dp[day][slot];
    if (!name) return;
    var sm = getMacrosForPerson(name, "Sam");
    var lm = getMacrosForPerson(name, "Luisa");
    samCal   += sm.cal;   samProt   += sm.prot;
    luisaCal += lm.cal;   luisaProt += lm.prot;
  });
  return {samCal:samCal, samProt:samProt, luisaCal:luisaCal, luisaProt:luisaProt,
          cal: samCal+luisaCal, prot: samProt+luisaProt};
}

// ═══════════════════════════════════════════════════════
// WEEK NAVIGATION
// ═══════════════════════════════════════════════════════
function changeWeek(dir) {
  var nw = state.currentWeek + dir;
  if (nw < 1 || nw > TOTAL_WEEKS) return;
  state.currentWeek = nw;
  save();
  updateWeekLabel();
  if (state.tab === "plan")     renderPlan();
  if (state.tab === "week")     renderWeek();
  if (state.tab === "shopping") renderShopping();
  if (state.tab === "prep")     renderPrep();
}

function updateWeekLabel() {
  var wk = state.currentWeek;
  document.getElementById("week-label-top").childNodes[0].textContent = "Week " + wk;
  document.getElementById("week-date-top").textContent = formatWeekDate(wk);
  document.getElementById("btn-prev-week").disabled = wk <= 1;
  document.getElementById("btn-next-week").disabled = wk >= TOTAL_WEEKS;
  document.getElementById("btn-prev-week").style.opacity = wk <= 1 ? "0.3" : "1";
  document.getElementById("btn-next-week").style.opacity = wk >= TOTAL_WEEKS ? "0.3" : "1";
}

// ═══════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(id) {
  document.querySelectorAll(".tab-panel").forEach(function(t) { t.classList.remove("active"); });
  document.querySelectorAll(".navbtn").forEach(function(b) { b.classList.remove("active"); });
  document.getElementById("tab-" + id).classList.add("active");
  document.getElementById("nav-" + id).classList.add("active");
  state.tab = id;
  if (id === "plan")     renderPlan();
  if (id === "recipes")  renderRecipes();
  if (id === "shopping") renderShopping();
  if (id === "prep")     renderPrep();
  if (id === "week")     renderWeek();
}

// ═══════════════════════════════════════════════════════
// PLAN TAB
// ═══════════════════════════════════════════════════════
function renderPlan() {
  renderDayStrip();
  renderDayDetail();
}

function renderDayStrip() {
  var html = "";
  DAYS.forEach(function(d, i) {
    var mac = getDayMacrosBoth(d);
    var ok = mac.samCal >= 1936 && mac.samCal <= 2464 && mac.luisaCal >= 1496 && mac.luisaCal <= 1904;
    var dotCls = mac.cal > 0 ? (ok ? " ok" : " warn") : "";
    var activeCls = i === state.activeDay ? " active" : "";
    html += "<button class=\"day-btn" + activeCls + "\" onclick=\"setDay(" + i + ")\">";
    html += "<div class=\"dn\">" + d.slice(0,3) + "</div>";
    html += "<div class=\"dot" + dotCls + "\"></div>";
    html += "</button>";
  });
  document.getElementById("day-strip").innerHTML = html;
}

function setDay(i) {
  state.activeDay = i;
  renderPlan();
}

function renderDayDetail() {
  var day = DAYS[state.activeDay];
  var dp  = getDisplayPlan();
  var slots = dp[day] || {};
  var mac = getDayMacrosBoth(day);

  var calPctS = Math.min(100, Math.round(mac.samCal / 2200 * 100));
  var calPctL = Math.min(100, Math.round(mac.luisaCal / 1700 * 100));

  var hdr = "<div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px\">";
  hdr += "<div style=\"font-family:Georgia,serif;font-size:22px\">" + day + "</div>";
  hdr += "<div style=\"font-size:11px;color:var(--mid)\">";
  hdr += "<span style=\"color:" + (calPctS>=88&&calPctS<=112?"var(--sage)":"var(--terra)") + ";font-weight:700\">S:" + (mac.samCal||"—") + "</span>";
  hdr += " &middot; ";
  hdr += "<span style=\"color:" + (calPctL>=88&&calPctL<=112?"var(--sage)":"var(--terra)") + ";font-weight:700\">L:" + (mac.luisaCal||"—") + "</span>";
  hdr += " kcal</div></div>";
  hdr += "<div class=\"macro-bars\">";
  hdr += "<div><div class=\"mbar-lbl\"><span>Sam</span><span style=\"font-weight:700;color:var(--charcoal)\">" + (mac.samCal||0) + " / 2200 kcal</span></div><div class=\"mbar-track\"><div class=\"mbar-fill\" style=\"width:" + calPctS + "%;background:" + (calPctS>=88?"var(--sage)":"var(--terra)") + "\"></div></div></div>";
  hdr += "<div><div class=\"mbar-lbl\"><span>Luisa</span><span style=\"font-weight:700;color:var(--charcoal)\">" + (mac.luisaCal||0) + " / 1700 kcal</span></div><div class=\"mbar-track\"><div class=\"mbar-fill\" style=\"width:" + calPctL + "%;background:" + (calPctL>=88?"var(--sage)":"var(--terra)") + "\"></div></div></div>";
  hdr += "</div>";
  document.getElementById("day-hdr").innerHTML = hdr;

  var slotsHtml = "";
  SLOTS.forEach(function(slot) {
    var name = slots[slot] || "";
    var isAuto = name.indexOf("\u2190 ") === 0;
    var isFree = (FREE_SLOTS[day] || []).indexOf(slot) >= 0;
    var isAutoLunch = (slot === "Lunch" && ["Monday","Tuesday","Wednesday","Thursday","Friday"].indexOf(day) >= 0);
    var editable = !isAutoLunch && !isFree;
    var realName = isAuto ? name.slice(2) : name;
    var meal = getMeal(realName);
    var smac = meal ? getMacrosForPerson(realName,"Sam") : null;
    var lmac = meal ? getMacrosForPerson(realName,"Luisa") : null;
    var macStr = smac ? "S:" + smac.cal + "  L:" + lmac.cal + " kcal" : "";

    // Use data attributes to avoid any quoting/escaping issues with slot names
    var changeBtn = (editable && name)
      ? "<button class=\"slot-change\" data-day=\"" + day + "\" data-slot=\"" + slot + "\" onclick=\"slotChange(this)\">Change</button>"
      : "";

    var lbl = "<div class=\"slot-lbl\"" + (!name ? " style=\"border-bottom:none\"" : "") + ">";
    lbl += "<div class=\"slot-lbl-left\">" + (SLOT_EMOJI[slot]||"") + " " + slot + "</div>" + changeBtn + "</div>";

// ═══════════════════════════════════════════════════════
// RECIPE SHEET — merged ingredients with Sam/Luisa split
// ═══════════════════════════════════════════════════════
function mergeIngredients(ingM, ingF, isDouble) {
  var mult = isDouble ? 2 : 1;
  var totals = {};
  var order = [];

  function parseIng(ing) {
    var match = ing.match(/^([\d./]+)\s*(g|ml|kg|tbsp|tsp|slices)?\s+(.+)/);
    if (match) {
      var qty = parseFloat(match[1]) || 1;
      var unit = match[2] || "";
      var item = match[3].split(",")[0].trim();
      if (unit === "kg") { qty *= 1000; unit = "g"; }
      return {item:item, qty:qty, unit:unit};
    }
    return {item:ing.split(",")[0].trim(), qty:1, unit:""};
  }

  function fmtQ(qty, unit) {
    if (!unit) return "";
    if (unit==="g")  return qty>=1000 ? (qty/1000).toFixed(1)+"kg" : Math.round(qty)+"g";
    if (unit==="ml") return qty>=1000 ? (qty/1000).toFixed(1)+"L"  : Math.round(qty)+"ml";
    return Math.round(qty)+(unit==="slices"?" slices":unit==="tbsp"?" tbsp":unit==="tsp"?" tsp":"");
  }

  ingM.forEach(function(ing) {
    var p = parseIng(ing); var k = p.item.toLowerCase();
    if (!totals[k]) { totals[k]={item:p.item,qtyM:0,qtyF:0,unit:p.unit}; order.push(k); }
    totals[k].qtyM += p.qty;
  });
  ingF.forEach(function(ing) {
    var p = parseIng(ing); var k = p.item.toLowerCase();
    if (!totals[k]) { totals[k]={item:p.item,qtyM:0,qtyF:0,unit:p.unit}; order.push(k); }
    totals[k].qtyF += p.qty;
  });

  return order.map(function(k) {
    var t = totals[k];
    var total = (t.qtyM + t.qtyF) * mult;
    var samAmt = t.qtyM * mult;
    var luisaAmt = t.qtyF * mult;
    var totalStr = fmtQ(total, t.unit);
    var samStr = fmtQ(samAmt, t.unit);
    var luisaStr = fmtQ(luisaAmt, t.unit);
    var x2tag = isDouble ? " <span style=\"color:#C04040;font-size:11px;font-weight:700\">x2</span>" : "";
    var sub = (samStr||luisaStr) ? " <span style=\"color:#AAA;font-size:12px\">(Sam " + (samStr||"\u2014") + " \u00B7 Luisa " + (luisaStr||"\u2014") + ")</span>" : "";
    var prefix = totalStr ? totalStr + " " : "";
    return prefix + t.item + x2tag + sub;
  });
}

// ═══════════════════════════════════════════════════════
// SHOPPING LIST
// ═══════════════════════════════════════════════════════
function buildShoppingList() {
  var plan = getCurrentPlan();
  var totals = {};

  function resolveKey(rawName) {
    var lower = rawName.toLowerCase().trim();
    if (CONSOLIDATE[lower]) return CONSOLIDATE[lower];
    var keys = Object.keys(CONSOLIDATE);
    for (var i=0;i<keys.length;i++) {
      var k = keys[i];
      if (lower.indexOf(k)>=0 || k.indexOf(lower)>=0) return CONSOLIDATE[k];
    }
    return null;
  }

  function addIng(ings, multiplier) {
    ings.forEach(function(ing) {
      var match = ing.match(/^([\d./]+)\s*(g|ml|kg)?\s+(.+)/);
      var rawQty, unit, rawName;
      if (match) {
        rawQty = parseFloat(match[1]) || 1;
        unit = match[2] || "";
        rawName = match[3].split(",")[0].trim();
      } else { rawQty=1; unit=""; rawName=ing.split(",")[0].trim(); }
      var rule = resolveKey(rawName);
      if (rule && rule.to === null) return;
      var canon = rule ? rule.to : rawName;
      var cat   = rule ? rule.cat : "\uD83E\uDDC2 Pantry";
      var u     = rule ? (rule.unit || unit) : unit;
      var qty   = (rule && rule.fixedQty !== undefined) ? rule.fixedQty : rawQty;
      var fQty  = (unit==="kg" ? qty*1000 : qty) * (multiplier||1);
      var fUnit = unit==="kg" ? "g" : u;
      var key   = canon.toLowerCase();
      if (!totals[key]) totals[key]={name:canon,qty:0,unit:fUnit,cat:cat};
      totals[key].qty += fQty;
    });
  }

  var freeMap = FREE_SLOTS;
  Object.keys(plan).forEach(function(day) {
    var freeSlots = freeMap[day] || [];
    Object.keys(plan[day]).forEach(function(slot) {
      if (freeSlots.indexOf(slot)>=0) return;
      var name = plan[day][slot];
      if (!name || name.indexOf("\u2190 ")===0) return;
      var m = getMeal(name);
      if (!m) return;
      var mult = (m.cat === "Dinner") ? 2 : 1;
      addIng(m.ingM, mult);
      addIng(m.ingF, mult);
    });
  });

  var items = Object.keys(totals).filter(function(k){ return totals[k].qty>0.05; }).map(function(k){ return totals[k]; });
  PANTRY_STAPLES.forEach(function(s) {
    var found = items.some(function(i){ return i.name.toLowerCase()===s.name.toLowerCase(); });
    if (!found) items.push({name:s.name, qty:s.qty, unit:s.unit, cat:s.cat});
  });

  items.sort(function(a,b){
    var ai=CAT_ORDER.indexOf(a.cat), bi=CAT_ORDER.indexOf(b.cat);
    if(ai!==bi) return (ai<0?99:ai)-(bi<0?99:bi);
    return a.name.localeCompare(b.name);
  });
  return items;
}

function fmtQty(qty, unit) {
  if (unit==="g")  return qty>=1000?(qty/1000).toFixed(qty>=2000?0:1)+"kg":Math.ceil(qty)+"g";
  if (unit==="ml") return qty>=1000?(qty/1000).toFixed(1)+"L":Math.ceil(qty)+"ml";
  if (unit==="cloves") return Math.ceil(qty)+" clove"+(qty>1?"s":"");
  if (unit==="sprigs") return Math.ceil(qty)+" sprig"+(qty>1?"s":"");
  if (unit==="slices") return Math.ceil(qty)+" slices";
  if (unit==="pack")   return Math.ceil(qty)+" pack";
  if (qty>1) return "x"+Math.ceil(qty);
  return "";
}

function clearChecked() { state.checked={}; save(); renderShopping(); }

function handleShopTap(el) {
  var key = el.getAttribute("data-key");
  state.checked[key] = !state.checked[key];
  save();
  renderShopping();
}

function renderShopping() {
  var items = buildShoppingList();
  var total = items.length;
  var done  = items.filter(function(i){ return state.checked[i.name.toLowerCase()]; }).length;
  var pct   = total ? Math.round(done/total*100) : 0;

  document.getElementById("shop-count").textContent = total + " items \u00B7 Sam + Luisa combined \u00B7 tap to tick off";
  document.getElementById("shop-progress").style.width = pct + "%";
  document.getElementById("shop-progress-txt").textContent = done + "/" + total;
  document.getElementById("shop-nav-lbl").textContent = done>0 ? "Shop ("+done+")" : "Shop";

  var html = "";
  var lastCat = null;
  items.forEach(function(item) {
    var key = item.name.toLowerCase();
    var checked = !!state.checked[key];
    if (item.cat !== lastCat) {
      html += "<div class=\"cat-header\">" + item.cat + "</div>";
      lastCat = item.cat;
    }
    var qty = fmtQty(item.qty, item.unit);
    var cCls = checked ? " checked" : "";
    html += "<div class=\"shop-item" + cCls + "\" data-key=\"" + key.replace(/"/g,"&quot;") + "\" onclick=\"handleShopTap(this)\">";
    html += "<div class=\"shop-cb" + cCls + "\"></div>";
    if (checked) { var el = html.lastIndexOf("shop-cb"); }
    html += "<div class=\"shop-name\">" + item.name + "</div>";
    if (qty) html += "<div class=\"qty-pill\">" + qty + "</div>";
    html += "</div>";
  });
  if (!html) html = "<div style=\"text-align:center;padding:60px 0;color:var(--light)\"><div style=\"font-size:40px;margin-bottom:8px\">&#x1F6D2;</div>Select meals in Plan tab first</div>";
  document.getElementById("shop-list").innerHTML = html;

  // Add checkmark via DOM after render (avoids innerHTML re-issues)
  document.querySelectorAll(".shop-cb.checked").forEach(function(el) {
    if (!el.textContent) el.textContent = "\u2713";
  });
}

function renderPrep() {

  var allSelected = [];
  var seen = {};
  Object.keys(plan).forEach(function(day) {
    Object.keys(plan[day]).forEach(function(slot) {
      var name = plan[day][slot];
      if (name && !seen[name]) { seen[name]=true; allSelected.push(name); }
    });
  });

  function ofCat(cat) { return allSelected.filter(function(n){ var m=getMeal(n); return m&&m.cat===cat; }); }
  var oatMeals = ofCat("Breakfast").filter(function(n){ return n.indexOf("Oats")>=0||n.indexOf("Bircher")>=0; });
  var dinners  = ofCat("Dinner");
  var smoothies= ofCat("Smoothie");
  var hasBoiled= allSelected.indexOf("Boiled Eggs \xD72")>=0;

  var riceS=0, riceL=0;
  Object.keys(plan).forEach(function(day) {
    Object.keys(plan[day]).forEach(function(slot) {
      var name = plan[day][slot];
      if (!name) return;
      var m = getMeal(name);
      if (!m) return;
      function parseRice(ings) {
        for (var i=0;i<ings.length;i++) {
          if (ings[i].toLowerCase().indexOf("dry white rice")>=0) {
            var mt=ings[i].match(/^([\d.]+)\s*g/);
            if (mt) return parseFloat(mt[1]);
          }
        }
        return 0;
      }
      riceS += parseRice(m.ingM);
      riceL += parseRice(m.ingF);
    });
  });

  function step(num, title, detail, hi) {
    return "<div class=\"prep-step\"><div class=\"step-num" + (hi?" hi":"") + "\">" + num + "</div><div><div class=\"step-title\">" + title + "</div><div class=\"step-detail\">" + detail + "</div></div></div>";
  }
  function section(icon, title, time, bg, body) {
    return "<div class=\"prep-section\"><div class=\"prep-hdr\" style=\"background:" + bg + "\"><div class=\"prep-hdr-left\"><span style=\"font-size:22px\">" + icon + "</span><span class=\"prep-hdr-title\">" + title + "</span></div>" + (time?"<span class=\"prep-time\">"+time+"</span>":"") + "</div><div class=\"prep-body\">" + body + "</div></div>";
  }

  var html = "<div class=\"golden-rule\"><div style=\"font-size:9px;letter-spacing:.25em;text-transform:uppercase;font-weight:700;color:var(--terra);margin-bottom:8px\">The golden rule</div><p>Cook double at every dinner. Package the second portion immediately. That's tomorrow's lunch \u2014 done.</p></div>";

  var riceDetail = (riceS+riceL)>0
    ? "Sam ~" + Math.ceil(riceS) + "g \u00B7 Luisa ~" + Math.ceil(riceL) + "g \u00B7 Total: " + Math.ceil(riceS+riceL) + "g dry. Cook in one big pot. Portion while warm."
    : "No rice dinners this week \u2014 skip.";

  html += section("☀️","Sunday Prep","60\u201390 min","#4F7A62",
    step(1,"Cook all week's rice",riceDetail) +
    step(2,"Overnight oat jars (" + oatMeals.length + " selected)",
      oatMeals.length>0 ? "Selected: " + oatMeals.join(", ") + ". Add oats + protein + honey to jars, pour over milk, seal. Done in 8 min."
      : "No overnight oats selected \u2014 skip.") +
    step(3,"Boiled eggs for snacks",
      hasBoiled ? "Hard boil 6\u20138 eggs (8 min from boiling). Ice bath. Store UNPEELED \u2014 stays fresh 7 days." : "Not selected \u2014 skip.", hasBoiled) +
    step(4,"Marinate & portion chicken","Divide into meal-size bags: soy+garlic, lemon+dijon+thyme, plain. Label and refrigerate.") +
    step(5,"Pre-measure dry ingredients","Weigh oats, protein, cocoa, chia into zip bags. Removes all weekday decisions.")
  );

  html += section("🌙","Wednesday Top-Up","20\u201330 min","#3A6A9A",
    step(1,"Check and top up rice","If fewer than 3 portions left, cook 400g more. Covers Thu\u2013Sun.") +
    step(2,oatMeals.length>0?"Prep more oat jars":"Breakfast check",
      oatMeals.length>0 ? "Same method as Sunday. Covers Thu, Fri, Sat breakfasts." : "Check what's in the fridge.") +
    step(3,"Defrost protein for Thu\u2013Sun","Move chicken/mince from freezer \u2192 fridge. 2 minutes now saves 30 Thursday night.")
  );

  var dinnerBody = dinners.length===0
    ? "<div style=\"padding:12px 0;font-size:13px;color:var(--light);font-style:italic\">No dinners selected \u2014 go to Plan tab</div>"
    : dinners.map(function(name) {
        var m = getMeal(name);
        if (!m) return "";
        return "<div class=\"dinner-item\"><span style=\"font-size:24px;flex-shrink:0\">" + m.emoji + "</span><div style=\"flex:1;min-width:0\"><div style=\"font-size:14px;font-weight:700;color:var(--charcoal)\">" + m.name + "</div><div style=\"font-size:11px;color:var(--light);margin:2px 0\">\u23F1 " + m.time + " \u00B7 S: " + m.calM + "kcal " + m.protM + "g \u00B7 L: " + m.calF + "kcal " + m.protF + "g</div><div class=\"dinner-note\">Cook double \u2192 pack both lunch containers before sitting down</div></div></div>";
      }).join("");
  html += section("🍽","This Week's Dinners","","#C04040",dinnerBody);

  if (smoothies.length>0) {
    var smBody = "<div class=\"tip-box\">\uD83D\uDCA1 Pre-bag dry ingredients Sunday. Each smoothie takes 90 sec \u2014 add milk and blend.</div>" +
      smoothies.map(function(name){
        var m=getMeal(name); if(!m) return "";
        return "<div class=\"dinner-item\"><span style=\"font-size:24px;flex-shrink:0\">" + m.emoji + "</span><div><div style=\"font-size:14px;font-weight:700;color:var(--charcoal)\">" + m.name + "</div><div style=\"font-size:11px;color:var(--light)\">" + m.ingF.slice(0,3).join(" \u00B7 ") + "</div></div></div>";
      }).join("");
    html += section("🥤","Smoothies (no cook)","","#7A4A9A",smBody);
  }

  html += "<div style=\"background:var(--terra-lt);border:1px solid #F0D0A0;border-radius:14px;padding:18px;margin-bottom:8px\"><div style=\"font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--terra);margin-bottom:10px\">Every dinner night</div>" +
    ["Cook full double portion \u2014 Sam's larger + Luisa's smaller serve in one pan.",
     "Plate your dinners. Then immediately pack the second portions into labelled containers.",
     "Into the fridge before you sit down to eat. Non-negotiable.",
     "Both lunches done. Zero decision-making tomorrow."
    ].map(function(s,i){ return "<div style=\"display:flex;gap:10px;margin-bottom:8px;font-size:13px;color:#444;line-height:1.6\"><span style=\"color:var(--terra);font-weight:700;flex-shrink:0\">"+(i+1)+".</span>"+s+"</div>"; }).join("") + "</div>";

  document.getElementById("prep-content").innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
updateWeekLabel();
renderPlan();
renderRecipes();
</script>
</body>
</html>
