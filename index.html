<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Plan">
<meta name="mobile-web-app-capable" content="yes">
<title>Meal Plan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF7F2;--white:#fff;--charcoal:#1E1E1E;--mid:#666;--light:#AAA;
  --sage:#4F7A62;--sage-lt:#E6F4EC;--terra:#C17A55;--terra-lt:#FEF3E2;
  --gold:#C9963A;--navy:#1A3A5C;--warm:#F3EDE2;
  --bs:0 2px 12px rgba(0,0,0,.07);
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--charcoal);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px;
  overscroll-behavior:none;-webkit-text-size-adjust:100%}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;
  max-width:480px;margin:0 auto;background:var(--bg)}
.topbar{background:var(--charcoal);padding:12px 16px 10px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.brand{font-family:Georgia,serif;font-size:17px;color:#fff;display:flex;align-items:center;gap:6px}
.ptoggle{display:flex;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.ptoggle button{padding:5px 14px;border:none;cursor:pointer;font-size:12px;font-weight:700;
  color:rgba(255,255,255,.5);background:transparent;transition:all .15s}
.ptoggle button.active{background:var(--terra);color:#fff}
.content{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;background:var(--bg)}
.tab-panel.active{display:block}
.bottomnav{flex-shrink:0;background:#fff;border-top:1px solid #EDE8E0;display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.navbtn{flex:1;border:none;background:transparent;cursor:pointer;padding:10px 4px 8px;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.navbtn .ni{font-size:20px;opacity:.4;transition:opacity .15s}
.navbtn .nl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--light);transition:color .15s}
.navbtn .nd{width:20px;height:2px;border-radius:1px;background:var(--terra);margin-top:2px;
  display:none}
.navbtn.active .ni{opacity:1}
.navbtn.active .nl{color:var(--terra)}
.navbtn.active .nd{display:block}
.section-title{font-family:Georgia,serif;font-size:20px;color:var(--charcoal)}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--light)}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--bs);border:1px solid rgba(0,0,0,.04)}
.sticky-hdr{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #F0EAE0}
.pill{display:inline-block;border-radius:20px;font-size:10px;font-weight:700;
  letter-spacing:.1em;padding:4px 11px;cursor:pointer;border:1.5px solid;
  white-space:nowrap;transition:all .15s}
.day-strip{display:flex;overflow-x:auto;background:#fff;
  border-bottom:1px solid #EDE8E0;-webkit-overflow-scrolling:touch}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex:0 0 calc(100%/7);border:none;background:transparent;cursor:pointer;
  padding:10px 2px 0;border-bottom:3px solid transparent;transition:all .15s}
.day-btn.active{background:var(--charcoal);border-bottom-color:var(--terra)}
.day-btn .dn{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--light)}
.day-btn.active .dn{color:#fff}
.day-btn .dot{width:6px;height:6px;border-radius:50%;margin:4px auto 6px;background:#DDD}
.day-btn .dot.ok{background:var(--sage)}
.day-btn .dot.warn{background:var(--terra)}
.day-hdr{padding:14px 16px 10px;background:#fff;border-bottom:1px solid #F0EAE0}
.macro-bars{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.mbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--mid);margin-bottom:4px}
.mbar-track{height:5px;background:#EDE8E0;border-radius:3px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px;transition:width .4s}
.slots{padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:80px}
.slot-card{background:#fff;border-radius:12px;overflow:hidden;
  box-shadow:0 1px 6px rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.04)}
.slot-lbl{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 7px}
.slot-lbl-left{display:flex;align-items:center;gap:5px;
  font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#CCC}
.slot-change{font-size:11px;color:var(--mid);border:1px solid #E8E0D8;
  background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer}
.slot-meal{padding:10px 14px 12px;cursor:pointer;display:flex;gap:10px;align-items:center}
.slot-meal.auto{background:#F0F8F4}
.slot-meal-name{font-size:14px;font-weight:600;color:var(--charcoal);line-height:1.3}
.slot-meal-name.auto{color:var(--sage);font-style:italic}
.slot-meal-macro{font-size:11px;color:var(--light);margin-top:2px}
.slot-empty{padding:12px 14px;color:#CCC;font-style:italic;font-size:13px;
  display:flex;align-items:center;gap:6px;cursor:pointer;border:none;
  background:transparent;width:100%;text-align:left}
.search-bar{width:100%;padding:10px 14px;border:1px solid #E0DAD0;border-radius:10px;
  font-size:15px;outline:none;box-sizing:border-box;background:#fff}
.cat-pills{display:flex;gap:6px;overflow-x:auto;padding:0 0 2px;-webkit-overflow-scrolling:touch}
.cat-pills::-webkit-scrollbar{display:none}
.recipe-list{padding-bottom:80px}
.recipe-item{display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:1px solid #F5F0E8;cursor:pointer;background:#fff;transition:background .1s}
.recipe-item:active{background:#F8F5F0}
.recipe-icon{width:48px;height:48px;border-radius:12px;display:flex;
  align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.recipe-item-name{font-size:14px;font-weight:600;color:var(--charcoal);line-height:1.25;margin-bottom:3px}
.recipe-item-meta{display:flex;gap:6px;align-items:center}
.recipe-cat-badge{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
.recipe-chevron{color:#CCC;font-size:20px;flex-shrink:0}
.progress-bar{height:6px;background:#EDE8E0;border-radius:3px;overflow:hidden;flex:1}
.progress-fill{height:100%;background:var(--sage);border-radius:3px;transition:width .3s}
.cat-header{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  color:var(--light);padding:16px 4px 8px;border-bottom:2px solid #EDE8E0;margin-bottom:4px}
.shop-item{display:flex;align-items:center;gap:12px;padding:11px 4px;
  border-bottom:1px solid #F5F0E8;cursor:pointer;transition:opacity .2s}
.shop-item.checked{opacity:.45}
.shop-cb{width:22px;height:22px;border-radius:5px;border:2px solid #CCC;
  background:#fff;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s}
.shop-cb.checked{background:var(--sage);border-color:var(--sage)}
.shop-cb.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:800;line-height:1}
.shop-name{flex:1;font-size:15px;font-weight:500;color:var(--charcoal)}
.shop-item.checked .shop-name{text-decoration:line-through}
.qty-pill{font-size:11px;font-weight:700;color:#777;background:#F0EBE3;padding:3px 9px;border-radius:6px;flex-shrink:0}
.prep-section{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;
  box-shadow:var(--bs);border:1px solid rgba(0,0,0,.04)}
.prep-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.prep-hdr-left{display:flex;align-items:center;gap:10px}
.prep-hdr-title{font-family:Georgia,serif;font-size:16px;color:#fff}
.prep-time{font-size:10px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.12);padding:3px 10px;border-radius:12px}
.prep-body{padding:4px 16px 10px}
.prep-step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #F5F0E8}
.prep-step:last-child{border-bottom:none}
.step-num{width:26px;height:26px;border-radius:13px;background:var(--charcoal);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-num.hi{background:var(--terra)}
.step-title{font-size:13px;font-weight:700;color:var(--charcoal);margin-bottom:3px}
.step-detail{font-size:12px;color:var(--mid);line-height:1.6}
.golden-rule{background:var(--charcoal);border-radius:14px;padding:18px;margin-bottom:14px}
.golden-rule p{font-family:Georgia,serif;font-size:15px;color:#fff;line-height:1.55}
.tip-box{background:var(--terra-lt);border:1px solid #F0D0A0;border-radius:10px;
  padding:11px 14px;margin:8px 0 4px;font-size:12px;color:#7A4020;line-height:1.6}
.dinner-item{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F5F0E8}
.dinner-item:last-child{border-bottom:none}
.dinner-note{font-size:11px;color:var(--terra);font-weight:600;margin-top:3px}
.sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;max-height:90vh;background:#fff;border-radius:20px 20px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s ease}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:#DDD;margin:10px auto 0;flex-shrink:0}
.sheet-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sheet-sticky{position:sticky;top:0;background:#fff;z-index:10;
  border-bottom:1px solid #F0EAE0;padding:12px 16px 10px;flex-shrink:0}
.recipe-hero{padding:20px 20px 16px;text-align:center}
.recipe-emoji-big{font-size:56px;display:block;margin-bottom:8px}
.recipe-h2{font-family:Georgia,serif;font-size:22px;margin-bottom:8px;line-height:1.2}
.recipe-desc{font-size:13px;color:var(--mid);line-height:1.65}
.macro-chips{display:flex;gap:10px;margin:16px 0 0}
.macro-chip{flex:1;border-radius:10px;padding:12px 8px;text-align:center}
.macro-chip-val{font-family:Georgia,serif;font-size:20px;line-height:1}
.macro-chip-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-top:3px}
.person-note{font-size:11px;color:var(--mid);background:#F8F5F0;border-radius:8px;padding:8px 12px;margin:12px 16px}
.ing-row{display:flex;align-items:baseline;gap:8px;padding:9px 0;border-bottom:1px solid #F5F0E8;font-size:14px;color:#444}
.ing-bullet{color:var(--sage);font-weight:700;font-size:16px;line-height:.8;flex-shrink:0}
.method-step{display:flex;gap:12px;margin-bottom:12px;font-size:13px;color:var(--mid);line-height:1.65}
.method-num{font-family:Georgia,serif;font-size:20px;flex-shrink:0;width:22px;line-height:1;margin-top:1px}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">🍽 Sam &amp; Luisa</div>
    <div class="ptoggle">
      <button id="btn-luisa" class="active" onclick="setPerson('Luisa')">Luisa</button>
      <button id="btn-sam" onclick="setPerson('Sam')">Sam</button>
    </div>
  </div>
  <div class="content">
    <div id="tab-plan" class="tab-panel active">
      <div class="sticky-hdr">
        <div class="day-strip" id="day-strip"></div>
        <div class="day-hdr" id="day-hdr"></div>
      </div>
      <div class="slots" id="slots"></div>
    </div>
    <div id="tab-recipes" class="tab-panel">
      <div class="sticky-hdr" style="padding:12px 14px 10px">
        <input class="search-bar" id="recipe-search" placeholder="Search recipes…" oninput="renderRecipes()">
        <div class="cat-pills" id="cat-pills" style="margin-top:8px"></div>
      </div>
      <div class="recipe-list" id="recipe-list"></div>
    </div>
    <div id="tab-shopping" class="tab-panel">
      <div class="sticky-hdr" style="padding:14px 16px 12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div class="section-title">Shopping List</div>
            <div id="shop-count" class="eyebrow" style="margin-top:2px"></div>
          </div>
          <button onclick="clearChecked()" style="padding:7px 12px;border:1px solid #E0DAD0;border-radius:8px;background:#fff;font-size:12px;color:var(--mid);cursor:pointer">↺ Reset</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="progress-bar"><div class="progress-fill" id="shop-progress"></div></div>
          <span id="shop-progress-txt" style="font-size:11px;color:var(--light);white-space:nowrap"></span>
        </div>
      </div>
      <div style="margin:10px 14px 0;padding:10px 12px;background:var(--terra-lt);border:1px solid #F0D0A0;border-radius:10px;font-size:12px;color:#7A4020;line-height:1.55">
        🛒 <strong>Pak'nSave tip:</strong> Rice 5kg ~$8.50 · Oats 1kg ~$3.50 · Chicken ~$13/kg · Mince ~$18.99/kg · Eggs ~$9.59/doz
      </div>
      <div id="shop-list" style="padding:0 14px 80px"></div>
    </div>
    <div id="tab-prep" class="tab-panel">
      <div class="sticky-hdr" style="padding:14px 16px 10px">
        <div class="section-title">Meal Prep Guide</div>
        <div class="eyebrow" style="margin-top:3px">Generated from your selected meals</div>
      </div>
      <div id="prep-content" style="padding:14px 14px 80px"></div>
    </div>
  </div>
  <div class="bottomnav">
    <button class="navbtn active" id="nav-plan" onclick="switchTab('plan')">
      <span class="ni">📅</span><span class="nl">Plan</span><span class="nd"></span>
    </button>
    <button class="navbtn" id="nav-recipes" onclick="switchTab('recipes')">
      <span class="ni">📖</span><span class="nl">Recipes</span><span class="nd"></span>
    </button>
    <button class="navbtn" id="nav-shopping" onclick="switchTab('shopping')">
      <span class="ni">🛒</span><span class="nl" id="shop-nav-lbl">Shop</span><span class="nd"></span>
    </button>
    <button class="navbtn" id="nav-prep" onclick="switchTab('prep')">
      <span class="ni">🧑‍🍳</span><span class="nl">Prep</span><span class="nd"></span>
    </button>
  </div>
</div>
<div class="sheet-overlay" id="recipe-sheet-overlay" onclick="closeRecipeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-sticky" id="recipe-sheet-header"></div>
    <div class="sheet-scroll" id="recipe-sheet-body"></div>
  </div>
</div>
<div class="sheet-overlay" id="picker-overlay" onclick="closePicker(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-sticky">
      <div id="picker-title" style="font-family:Georgia,serif;font-size:17px;margin-bottom:2px"></div>
      <div id="picker-day" style="font-size:11px;color:var(--light);margin-bottom:10px"></div>
      <input class="search-bar" id="picker-search" placeholder="Search meals…" oninput="renderPickerList()">
      <div class="cat-pills" id="picker-pills" style="margin-top:8px"></div>
    </div>
    <div class="sheet-scroll" id="picker-list"></div>
  </div>
</div>

// Category sort order
const CAT_ORDER = ["🥩 Protein","💪 Supplements","🥛 Dairy","🍚 Carbs","🥜 Nuts","🥦 Veg","🍌 Fruit","🧂 Pantry"];

function buildShoppingList(plan) {
  const totals = {};

  const resolveKey = (rawName) => {
    const lower = rawName.toLowerCase().trim();
    if (CONSOLIDATE[lower]) return CONSOLIDATE[lower];
    for (const [key, val] of Object.entries(CONSOLIDATE)) {
      if (lower.includes(key) || key.includes(lower)) return val;
    }
    return null;
  };

  const addIng = (ings) => {
    ings.forEach(ing => {
      const match = ing.match(/^([\d./½¼¾]+)\s*(g|ml|kg)?\s+(.+)/);
      let rawQty, unit, rawName;
      if (match) {
        const qtyStr = match[1].replace("½","0.5").replace("¼","0.25").replace("¾","0.75");
        rawQty = parseFloat(qtyStr) || 1;
        unit = match[2] || "";
        rawName = match[3].split(",")[0].trim();
      } else {
        rawQty = 1; unit = ""; rawName = ing.split(",")[0].trim();
      }
      const rule = resolveKey(rawName);
      if (rule && rule.to === null) return;
      const canonName = rule ? rule.to : rawName;
      const canonCat  = rule ? rule.cat : "🧂 Pantry";
      const canonUnit = rule ? (rule.unit || unit) : unit;
      const qty = rule?.fixedQty !== undefined ? rule.fixedQty : rawQty;
      const finalQty = unit === "kg" ? qty * 1000 : qty;
      const finalUnit = unit === "kg" ? "g" : canonUnit;
      const key = canonName.toLowerCase();
      if (!totals[key]) totals[key] = { name: canonName, qty: 0, unit: finalUnit, cat: canonCat };
      totals[key].qty += finalQty;
    });
  };

  // Add BOTH Sam and Luisa portions for every selected meal
  Object.values(plan).forEach(slots => {
    Object.values(slots).forEach(mealName => {
      if (!mealName || mealName.startsWith("←") || mealName.startsWith("—")) return;
      const meal = MEALS.find(m => m.name === mealName);
      if (!meal) return;
      addIng(meal.ingM); // Sam's portion
      addIng(meal.ingF); // Luisa's portion
    });
  });

  const items = Object.values(totals).filter(i => i.qty > 0.05);
  items.sort((a, b) => {
    const ai = CAT_ORDER.indexOf(a.cat);
    const bi = CAT_ORDER.indexOf(b.cat);
    if (ai !== bi) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    return a.name.localeCompare(b.name);
  });
  return items;
}

// ── MODAL BASE ──────────────────────────────────────────────────────────────
function Sheet({ open, onClose, children, tall }) {
  useEffect(() => {
    document.body.style.overflow = open ? "hidden" : "";
    return () => { document.body.style.overflow = ""; };
  }, [open]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, zIndex:200,
      background:"rgba(0,0,0,0.5)",
      display:"flex", alignItems:"flex-end",
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:"100%", maxHeight: tall ? "94vh" : "80vh",
        background:"white", borderRadius:"20px 20px 0 0",
        overflow:"auto", boxShadow:"0 -8px 40px rgba(0,0,0,0.2)",
      }}>
        <div style={{ width:40, height:4, borderRadius:2, background:"#DDD", margin:"12px auto 4px" }}/>
        {children}
      </div>
    </div>
  );
}

              <span style={{ fontFamily:"Georgia,serif", fontSize:22, color:col.accent, lineHeight:1, minWidth:24, flexShrink:0 }}>{i+1}</span>
              <span dangerouslySetInnerHTML={{__html:step.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}}/>
            </div>
          ))}
        </div>
      </div>
    </Sheet>
  );
}

// ── MEAL PICKER ───────────────────────────────────────────────────────────
function MealPicker({ day, slot, onSelect, onClose, person }) {
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("All");
  const filtered = MEALS.filter(m =>
    (cat==="All" || m.cat===cat) &&
    m.name.toLowerCase().includes(search.toLowerCase())
  );
  return (
    <Sheet open onClose={onClose} tall>
      <div style={{ position:"sticky", top:0, background:"white", padding:"12px 20px 12px", zIndex:10, borderBottom:"1px solid #F0EAE0" }}>
        <div style={{ fontFamily:"Georgia,serif", fontSize:17, marginBottom:2 }}>{SLOT_EMOJI[slot]} {slot}</div>
        <div style={{ fontSize:11, color:"#888", marginBottom:12 }}>{day}</div>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search…" autoFocus
          style={{ width:"100%", padding:"10px 14px", border:"1px solid #E0DAD0", borderRadius:10, fontSize:15, outline:"none", boxSizing:"border-box" }}/>
        <div style={{ display:"flex", gap:6, overflowX:"auto", marginTop:10, paddingBottom:4, WebkitOverflowScrolling:"touch" }}>
          {CATEGORIES.map(c=>{
            const col=CAT_COLOR[c];
            return (
              <button key={c} onClick={()=>setCat(c)} style={{
                padding:"5px 12px", borderRadius:20, border:`1.5px solid ${col.accent}`, fontSize:11, fontWeight:700,
                cursor:"pointer", whiteSpace:"nowrap", flexShrink:0,
                background:cat===c?col.accent:"white", color:cat===c?"white":col.accent
              }}>{c}</button>
            );
          })}
        </div>
      </div>
      <div style={{ padding:"4px 0 120px" }}>
        <div onClick={()=>{onSelect("");onClose();}} style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 20px", borderBottom:"1px solid #F0EAE0", color:"#888", fontSize:14 }}>
          <span style={{fontSize:18}}>✕</span> Clear this slot
        </div>
        {filtered.map(meal=>{
          const col=CAT_COLOR[meal.cat];
          const cal = person==="Sam"?meal.calM:meal.calF;
          const prot = person==="Sam"?meal.protM:meal.protF;
          return (
            <div key={meal.id} onClick={()=>{onSelect(meal.name);onClose();}} style={{
              display:"flex", alignItems:"center", gap:14, padding:"13px 20px",
              borderBottom:"1px solid #F8F4F0", activeStyle:{background:"#F8F5F0"}
            }}>
              <span style={{fontSize:28,flexShrink:0}}>{meal.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:"#1E1E1E"}}>{meal.name}</div>
                <div style={{fontSize:11,color:"#888",marginTop:2}}>{meal.cat} · {cal} kcal · {prot}g</div>
              </div>
              <span style={{color:col.accent,fontSize:20,flexShrink:0}}>›</span>
            </div>
          );
        })}
      </div>
    </Sheet>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]       = useState("plan");
  const [person, setPerson] = useState("Luisa");
  const [activeDay, setActiveDay] = useState(0);
  const [plan, setPlan]     = useState(()=>{ try{return JSON.parse(localStorage.getItem("mealPlan_v2"))||DEFAULT_PLAN;}catch{return DEFAULT_PLAN;} });
  const [checked, setChecked] = useState(()=>{ try{return JSON.parse(localStorage.getItem("checked_v2"))||{};}catch{return {};} });
  const [picker, setPicker] = useState(null);   // {day,slot}
  const [recipe, setRecipe] = useState(null);
  const [recCat, setRecCat] = useState("All");
  const [recSearch, setRecSearch] = useState("");

  useEffect(()=>{ localStorage.setItem("mealPlan_v2",JSON.stringify(plan)); },[plan]);
  useEffect(()=>{ localStorage.setItem("checked_v2",JSON.stringify(checked)); },[checked]);

  // Resolve display plan with auto-lunches
  const displayPlan = useMemo(()=>{
    const p = JSON.parse(JSON.stringify(plan));
    Object.entries(AUTO_LUNCH_DAYS).forEach(([day,prevDay])=>{
      const prev = plan[prevDay]?.Dinner;
      p[day].Lunch = prev ? `← ${prev}` : "";
    });
    return p;
  },[plan]);

  const setMeal = (day, slot, name) => setPlan(p=>({...p,[day]:{...p[day],[slot]:name}}));

  // Day macros
  const dayMacros = (day) => {
    let cal=0, prot=0;
    Object.values(displayPlan[day]||{}).forEach(name=>{
      if (!name) return;
      const real = name.startsWith("←") ? name.replace("← ","") : name;
      const {cal:c,prot:pt} = getMacros(real, person);
      cal+=c; prot+=pt;
    });
    return {cal,prot};
  };

  const shoppingItems = useMemo(()=>buildShoppingList(plan),[plan]);
  const checkedCount = Object.values(checked).filter(Boolean).length;

  const filteredRecipes = MEALS.filter(m=>
    (recCat==="All"||m.cat===recCat) &&
    m.name.toLowerCase().includes(recSearch.toLowerCase())
  );

  const TARGET = person==="Sam" ? 2200 : 1700;
  const PROT_TARGET = person==="Sam" ? 190 : 125;

  // ── PLAN TAB ──────────────────────────────────────────────────────────
  const PlanTab = () => {
    const day = DAYS[activeDay];
    const slots = displayPlan[day] || {};
    const {cal,prot} = dayMacros(day);
    const calPct = Math.min(100, Math.round(cal/TARGET*100));
    const protPct = Math.min(100, Math.round(prot/PROT_TARGET*100));
    const calOk = cal >= TARGET*0.88 && cal <= TARGET*1.12;
    const protOk = prot >= PROT_TARGET*0.88;

    return (
      <div style={{flex:1,overflow:"auto",paddingBottom:80}}>
        {/* Day strip */}
        <div style={{ overflowX:"auto", display:"flex", gap:0, background:"white",
          borderBottom:"1px solid #EDE8E0", position:"sticky", top:0, zIndex:10,
          WebkitOverflowScrolling:"touch" }}>
          {DAYS.map((d,i)=>{
            const {cal:dc} = dayMacros(d);
            const ok = dc >= TARGET*0.88 && dc <= TARGET*1.12;
            return (
              <button key={d} onClick={()=>setActiveDay(i)} style={{
                flex:"0 0 calc(100%/7)", padding:"10px 4px 8px", border:"none", cursor:"pointer",
                background: i===activeDay ? "#1E1E1E" : "white",
                borderBottom: i===activeDay ? "3px solid #C17A55" : "3px solid transparent",
                transition:"all 0.15s"
              }}>
                <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase",
                  color: i===activeDay ? "white" : "#AAA" }}>{d.slice(0,3)}</div>
                <div style={{ width:6, height:6, borderRadius:"50%", margin:"4px auto 0",
                  background: dc>0 ? (ok?"#4F7A62":"#C17A55") : "#DDD" }}/>
              </button>
            );
          })}
        </div>

        {/* Day header */}
        <div style={{ padding:"18px 20px 12px", background:"white", borderBottom:"1px solid #F0EAE0" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:12 }}>
            <h2 style={{ fontFamily:"Georgia,serif", fontSize:22 }}>{day}</h2>
            <div style={{ fontSize:12, color:"#888" }}>
              <span style={{ color:calOk?"#4F7A62":"#C17A55", fontWeight:700 }}>{cal||"—"}</span> / {TARGET} kcal
            </div>
          </div>
          {/* Macro bars */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {[["Calories",cal,TARGET,calPct,"#4F7A62","kcal"],["Protein",prot,PROT_TARGET,protPct,"#3A6A9A","g"]].map(([lbl,v,t,pct,color,unit])=>(
              <div key={lbl}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#888", marginBottom:4 }}>
                  <span>{lbl}</span><span style={{fontWeight:700,color:"#1E1E1E"}}>{v}{unit}</span>
                </div>
                <div style={{ height:5, background:"#EDE8E0", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${pct}%`, background:pct>=88?color:"#E8A050", borderRadius:3, transition:"width 0.4s" }}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Slots */}
        <div style={{ padding:"12px 16px", display:"flex", flexDirection:"column", gap:10 }}>
          {SLOTS.map(slot=>{
            const mealName = slots[slot] || "";
            const isAuto = mealName.startsWith("←");
            const isEditable = !isAuto;
            const meal = MEALS.find(m=>m.name===mealName);
            const col = meal ? CAT_COLOR[meal.cat] : null;
            const macros = getMacros(isAuto ? mealName.replace("← ","") : mealName, person);

            return (
              <div key={slot} style={{ background:"white", borderRadius:14, overflow:"hidden",
                boxShadow:"0 1px 8px rgba(0,0,0,0.06)", border:"1px solid rgba(0,0,0,0.04)" }}>
                {/* Slot label */}
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                  padding:"10px 16px 8px", borderBottom: mealName ? `1px solid ${col?.bg||"#F0EAE0"}` : "none" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:11,
                    letterSpacing:"0.15em", textTransform:"uppercase", fontWeight:700, color:"#AAA" }}>
                    <span>{SLOT_EMOJI[slot]}</span> {slot}
                  </div>
                  {isEditable && mealName && (
                    <button onClick={()=>setPicker({day,slot})} style={{
                      fontSize:11, color:"#888", border:"1px solid #E8E0D8",
                      background:"white", borderRadius:6, padding:"3px 8px", cursor:"pointer"
                    }}>Change</button>
                  )}
                </div>

                {mealName ? (
                  <div onClick={()=>{ if(isEditable) setPicker({day,slot}); else if(meal) setRecipe(meal); }}
                    style={{ padding:"12px 16px", cursor:"pointer",
                      background: isAuto ? "#F0F8F4" : "white" }}>
                    <div style={{ display:"flex", gap:12, alignItems:"center" }}>
                      {meal && <span style={{fontSize:28,flexShrink:0}}>{meal.emoji}</span>}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{ fontSize:14, fontWeight:600, color:isAuto?"#4F7A62":"#1E1E1E",
                          fontStyle:isAuto?"italic":"normal", lineHeight:1.3 }}>
                          {isAuto ? mealName : mealName}
                        </div>
                        {macros.cal>0 && (
                          <div style={{ fontSize:11, color:"#888", marginTop:3 }}>
                            {macros.cal} kcal · {macros.prot}g protein
                          </div>
                        )}
                      </div>
                      {meal && !isAuto && <span style={{color:"#CCC",fontSize:18}}>›</span>}
                    </div>
                  </div>
                ) : (
                  <button onClick={()=>setPicker({day,slot})} style={{
                    width:"100%", padding:"14px 16px", background:"none", border:"none",
                    cursor:"pointer", textAlign:"left", fontSize:14, color:"#CCC",
                    fontStyle:"italic", display:"flex", alignItems:"center", gap:8
                  }}>
                    <span style={{fontSize:20,color:"#DDD"}}>+</span> Add {slot.toLowerCase()}
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── RECIPES TAB ────────────────────────────────────────────────────────
  const RecipesTab = () => (
    <div style={{flex:1,overflow:"auto",paddingBottom:80}}>
      {/* Search */}
      <div style={{ padding:"14px 16px 10px", background:"white", borderBottom:"1px solid #F0EAE0",
        position:"sticky", top:0, zIndex:10 }}>
        <input value={recSearch} onChange={e=>setRecSearch(e.target.value)}
          placeholder="Search recipes…"
          style={{ width:"100%", padding:"10px 14px", border:"1px solid #E0DAD0",
            borderRadius:10, fontSize:15, outline:"none", boxSizing:"border-box", marginBottom:10 }}/>
        <div style={{ display:"flex", gap:6, overflowX:"auto", WebkitOverflowScrolling:"touch", paddingBottom:2 }}>
          {CATEGORIES.map(c=>{
            const col=CAT_COLOR[c];
            return (
              <button key={c} onClick={()=>setRecCat(c)} style={{
                padding:"5px 12px", borderRadius:20, border:`1.5px solid ${col.accent}`,
                fontSize:11, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0,
                background:recCat===c?col.accent:"white", color:recCat===c?"white":col.accent
              }}>{c}</button>
            );
          })}
        </div>
      </div>
      {/* List */}
      <div style={{padding:"8px 0"}}>
        {filteredRecipes.map(meal=>{
          const col=CAT_COLOR[meal.cat];
          const cal=person==="Sam"?meal.calM:meal.calF;
          const prot=person==="Sam"?meal.protM:meal.protF;
          return (
            <div key={meal.id} onClick={()=>setRecipe(meal)} style={{
              display:"flex", alignItems:"center", gap:14, padding:"14px 20px",
              borderBottom:"1px solid #F5F0E8", cursor:"pointer", background:"white",
              transition:"background 0.1s"
            }}>
              <div style={{ width:52, height:52, borderRadius:12, background:col.bg,
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:28, flexShrink:0 }}>
                {meal.emoji}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{ fontSize:14, fontWeight:600, color:"#1E1E1E", lineHeight:1.25, marginBottom:3 }}>{meal.name}</div>
                <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                  <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.15em",
                    textTransform:"uppercase", color:col.accent }}>{meal.cat}</span>
                  <span style={{ fontSize:11, color:"#AAA" }}>·</span>
                  <span style={{ fontSize:11, color:"#888" }}>{cal} kcal · {prot}g protein</span>
                </div>
              </div>
              <span style={{color:"#CCC",fontSize:22,flexShrink:0}}>›</span>
            </div>
          );
        })}
        {filteredRecipes.length===0 && (
          <div style={{textAlign:"center",padding:"60px 20px",color:"#AAA"}}>
            <div style={{fontSize:40,marginBottom:8}}>🔍</div>
            <div>No recipes found</div>
          </div>
        )}
      </div>
    </div>
  );

  // ── SHOPPING TAB ────────────────────────────────────────────────────────
  const ShoppingTab = () => (
    <div style={{flex:1,overflow:"auto",paddingBottom:80}}>
      {/* Header */}
      <div style={{ padding:"16px 20px 12px", background:"white", borderBottom:"1px solid #F0EAE0",
        position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <div>
            <h2 style={{ fontFamily:"Georgia,serif", fontSize:20 }}>Shopping List</h2>
            <div style={{ fontSize:11, color:"#888" }}>{shoppingItems.length} items · Sam + Luisa combined · tap to tick off</div>
          </div>
          <button onClick={()=>setChecked({})} style={{
            padding:"7px 14px", border:"1px solid #E0DAD0", borderRadius:8,
            background:"white", fontSize:12, color:"#888", cursor:"pointer"
          }}>↺ Reset</button>
        </div>
        {/* Progress */}
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ flex:1, height:6, background:"#EDE8E0", borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", borderRadius:3, background:"#4F7A62",
              width:`${shoppingItems.length?Math.round(checkedCount/shoppingItems.length*100):0}%`,
              transition:"width 0.3s" }}/>
          </div>
          <span style={{ fontSize:11, color:"#888", whiteSpace:"nowrap" }}>{checkedCount}/{shoppingItems.length}</span>
        </div>
      </div>

      {/* Tip */}
      <div style={{ margin:"12px 16px 0", padding:"11px 14px", background:"#FEF3E2",
        border:"1px solid #F0D0A0", borderRadius:10, fontSize:12, color:"#7A4020", lineHeight:1.6 }}>
        🛒 <strong>Pak'nSave tip:</strong> Buy rice 5kg (~$8.50), oats 1kg (~$3.50), protein powder in bulk. Chicken ~$13/kg, mince ~$18.99/kg.
      </div>

      {/* Items grouped by category */}
      <div style={{padding:"0 16px 20px"}}>
        {shoppingItems.length===0 ? (
          <div style={{textAlign:"center",padding:"60px 0",color:"#AAA"}}>
            <div style={{fontSize:40,marginBottom:8}}>🛒</div>
            <div style={{fontSize:16,marginBottom:6}}>No meals selected yet</div>
            <div style={{fontSize:13}}>Go to Plan tab and choose your meals</div>
          </div>
        ) : (() => {
          const rendered = [];
          let lastCat = null;

          shoppingItems.forEach(item => {
            const key = item.name.toLowerCase();
            const isChecked = !!checked[key];

            // Category divider
            if (item.cat !== lastCat) {
              rendered.push(
                <div key={`hdr-${item.cat}`} style={{
                  fontSize:10, fontWeight:700, letterSpacing:"0.22em",
                  textTransform:"uppercase", color:"#AAA",
                  padding:"20px 0 8px",
                  borderBottom:"2px solid #EDE8E0",
                  marginBottom:4
                }}>{item.cat}</div>
              );
              lastCat = item.cat;
            }

            // Format qty
            const q = item.qty;
            let qtyLabel = "";
            if (item.unit === "g") {
              qtyLabel = q >= 1000 ? `${(q/1000).toFixed(q>=2000?0:1)} kg` : `${Math.ceil(q)} g`;
            } else if (item.unit === "ml") {
              qtyLabel = q >= 1000 ? `${(q/1000).toFixed(1)} L` : `${Math.ceil(q)} ml`;
            } else if (item.unit === "cloves") {
              qtyLabel = `${Math.ceil(q)} clove${q>1?"s":""}`;
            } else if (item.unit === "sprigs") {
              qtyLabel = `${Math.ceil(q)} sprig${q>1?"s":""}`;
            } else if (item.unit === "pack") {
              qtyLabel = `${Math.ceil(q)} pack`;
            } else if (q > 1) {
              qtyLabel = `× ${Math.ceil(q)}`;
            }

            rendered.push(
              <div key={key}
                onClick={()=>setChecked(p=>({...p,[key]:!p[key]}))}
                style={{
                  display:"flex", alignItems:"center", gap:12,
                  padding:"11px 0",
                  borderBottom:"1px solid #F5F0E8",
                  cursor:"pointer",
                  WebkitTapHighlightColor:"transparent",
                  opacity: isChecked ? 0.45 : 1,
                  transition:"opacity 0.2s"
                }}>
                {/* Checkbox */}
                <div style={{
                  width:22, height:22, borderRadius:5, flexShrink:0,
                  border:`2px solid ${isChecked?"#4F7A62":"#CCC"}`,
                  background: isChecked ? "#4F7A62" : "white",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  transition:"all 0.15s"
                }}>
                  {isChecked && <span style={{color:"white",fontSize:13,fontWeight:800,lineHeight:1}}>✓</span>}
                </div>
                {/* Name */}
                <span style={{
                  flex:1, fontSize:15, fontWeight:500, color:"#1E1E1E",
                  textDecoration: isChecked ? "line-through" : "none"
                }}>{item.name}</span>
                {/* Qty pill */}
                {qtyLabel && (
                  <span style={{
                    fontSize:12, fontWeight:700, color:"#777",
                    background:"#F0EBE3", borderRadius:6,
                    padding:"3px 9px", flexShrink:0
                  }}>{qtyLabel}</span>
                )}
              </div>
            );
          });
          return rendered;
        })()}
      </div>
    </div>
  );

  // ── PREP TAB ────────────────────────────────────────────────────────────
  const PrepTab = () => {
    // Collect all unique selected meals (deduplicated)
    const allSelected = useMemo(() => {
      const seen = new Set();
      const meals = [];
      Object.values(plan).forEach(slots => {
        Object.values(slots).forEach(name => {
          if (!name || name.startsWith("←")) return;
          if (!seen.has(name)) { seen.add(name); meals.push(name); }
        });
      });
      return meals;
    }, []);

    // Find selected meals by category
    const getMealsOfCat = (cat) => allSelected.filter(n => {
      const m = MEALS.find(x => x.name === n);
      return m && m.cat === cat;
    });

    const oatMeals     = getMealsOfCat("Breakfast").filter(n => n.includes("Oats") || n.includes("Bircher"));
    const dinners      = getMealsOfCat("Dinner");
    const smoothies    = getMealsOfCat("Smoothie");
    const eggMuffins   = allSelected.includes("Egg Muffins");
    const boiledEggs   = allSelected.includes("Boiled Eggs ×2");

    // Sam's rice needed (total ingM dry white rice across all dinners + lunches)
    const riceQty = { sam: 0, luisa: 0 };
    Object.values(plan).forEach(slots => {
      Object.values(slots).forEach(name => {
        if (!name || name.startsWith("←")) return;
        const meal = MEALS.find(m => m.name === name);
        if (!meal) return;
        const parseG = (ings, keyword) => {
          for (const ing of ings) {
            if (ing.toLowerCase().includes(keyword)) {
              const m = ing.match(/^([\d.]+)\s*g/);
              if (m) return parseFloat(m[1]);
            }
          }
          return 0;
        };
        riceQty.sam   += parseG(meal.ingM, "dry white rice");
        riceQty.luisa += parseG(meal.ingF, "dry white rice");
      });
    });

    const Step = ({num, title, detail, highlight}) => (
      <div style={{ display:"flex", gap:14, padding:"14px 0", borderBottom:"1px solid #F5F0E8" }}>
        <div style={{
          width:28, height:28, borderRadius:14, flexShrink:0,
          background: highlight ? "#C17A55" : "#1E1E1E",
          color:"white", display:"flex", alignItems:"center", justifyContent:"center",
          fontFamily:"Georgia,serif", fontSize:14, fontWeight:700
        }}>{num}</div>
        <div style={{flex:1}}>
          <div style={{ fontSize:14, fontWeight:700, color:"#1E1E1E", marginBottom:3 }}>{title}</div>
          <div style={{ fontSize:13, color:"#666", lineHeight:1.65 }}>{detail}</div>
        </div>
      </div>
    );

    const Section = ({icon, title, time, bg, children}) => (
      <div style={{ background:"white", borderRadius:14, overflow:"hidden",
        boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid rgba(0,0,0,0.04)", marginBottom:16 }}>
        <div style={{ background: bg||"#1E1E1E", padding:"14px 18px",
          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{fontSize:22}}>{icon}</span>
            <span style={{ fontFamily:"Georgia,serif", fontSize:17, color:"white" }}>{title}</span>
          </div>
          {time && <span style={{ fontSize:11, color:"rgba(255,255,255,0.6)",
            background:"rgba(255,255,255,0.12)", padding:"3px 10px", borderRadius:12 }}>{time}</span>}
        </div>
        <div style={{padding:"4px 18px 8px"}}>{children}</div>
      </div>
    );

    const Tip = ({text}) => (
      <div style={{ background:"#FEF3E2", border:"1px solid #F0D0A0", borderRadius:10,
        padding:"11px 14px", marginBottom:16, fontSize:13, color:"#7A4020", lineHeight:1.6 }}>
        💡 {text}
      </div>
    );

    const NoneSelected = ({label}) => (
      <div style={{ padding:"12px 0 4px", fontSize:13, color:"#AAA", fontStyle:"italic" }}>
        No {label} selected this week — skip this step.
      </div>
    );

    return (
      <div style={{flex:1, overflow:"auto", paddingBottom:80}}>
        {/* Header */}
        <div style={{ padding:"18px 20px 14px", background:"white",
          borderBottom:"1px solid #F0EAE0", position:"sticky", top:0, zIndex:10 }}>
          <h2 style={{ fontFamily:"Georgia,serif", fontSize:20, marginBottom:4 }}>Meal Prep Guide</h2>
          <div style={{ fontSize:11, color:"#888" }}>Based on your selected meals this week</div>
        </div>

        <div style={{padding:"16px 16px 0"}}>

          {/* Golden rule */}
          <div style={{ background:"#1E1E1E", borderRadius:14, padding:"20px", marginBottom:16 }}>
            <div style={{ fontSize:10, letterSpacing:"0.25em", textTransform:"uppercase",
              fontWeight:700, color:"#C17A55", marginBottom:8 }}>The golden rule</div>
            <p style={{ fontFamily:"Georgia,serif", fontSize:16, color:"white",
              lineHeight:1.55, margin:0 }}>
              Cook double at every dinner. Package the second portion immediately.
              That's tomorrow's lunch — done.
            </p>
          </div>

          {/* ── SUNDAY PREP ── */}
          <Section icon="☀️" title="Sunday Prep" time="60–90 min" bg="#4F7A62">

            {/* Rice */}
            {riceQty.sam + riceQty.luisa > 0 ? (
              <Step num={1} title="Cook all rice for the week"
                detail={`Sam needs ~${Math.ceil(riceQty.sam)}g dry rice · Luisa needs ~${Math.ceil(riceQty.luisa)}g dry rice · Total: ${Math.ceil(riceQty.sam + riceQty.luisa)}g dry (cook in one big pot). Portion into containers immediately while warm.`}/>
            ) : (
              <Step num={1} title="Cook rice" detail="No rice-based dinners selected this week — skip or cook a small batch for lunch bowls."/>
            )}

            {/* Overnight oats */}
            <Step num={2}
              title={`Overnight oat jars (${oatMeals.length > 0 ? oatMeals.length + " variety" + (oatMeals.length>1?"s":"") + " selected" : "none selected"})`}
              detail={oatMeals.length > 0
                ? `Prep: ${oatMeals.join(", ")}. Line up jars, add dry ingredients first (oats + protein + honey), pour over trim milk, seal. Done in 8 min. Makes Mon–${oatMeals.length >= 5 ? "Fri" : "Thu"} breakfasts.`
                : "No overnight oats selected — skip, or prep a batch of your choice anyway."}/>

            {/* Egg muffins */}
            {eggMuffins ? (
              <Step num={3} title="Egg muffins — batch bake" highlight
                detail="Preheat 180°C. Whisk eggs, add cooked chicken, capsicum, spinach, cheese. Fill muffin tin ¾ full. Bake 18–20 min. Cool fully before storing. Makes 6 muffins (3 servings). Reheat 60 sec each morning."/>
            ) : (
              <Step num={3} title="Egg muffins" detail="Not selected this week — skip."/>
            )}

            {/* Boiled eggs */}
            {boiledEggs ? (
              <Step num={4} title="Boiled eggs for snacks" highlight
                detail="Hard boil 6–8 eggs (8 min from boiling). Ice bath immediately. Store UNPEELED in fridge — stays fresh 7 days. Peel when eating."/>
            ) : (
              <Step num={4} title="Boiled eggs" detail="Not selected as a snack this week — skip."/>
            )}

            {/* Marinate chicken */}
            <Step num={5} title="Marinate & portion chicken"
              detail="Divide chicken into meal-sized portions based on this week's dinners. Soy + garlic bag for stir-fry nights. Lemon + dijon + thyme bag for roast nights. Plain for pasta. Refrigerate."/>

            {/* Pre-measure */}
            <Step num={6} title="Pre-measure dry ingredients (5 min)"
              detail="Weigh out oats, protein powder, cocoa, chia seeds into small zip bags or containers. Removes all decision-making during the week. Label each bag with the meal name."/>

          </Section>

          {/* ── MIDWEEK TOP-UP ── */}
          <Section icon="🌙" title="Wednesday Top-Up" time="20–30 min" bg="#3A6A9A">

            <Step num={1} title="Check and restock rice"
              detail="If fewer than 3 portions left in the fridge, cook another 400g dry rice. Replenishes Thu–Sun meals."/>

            {oatMeals.length > 0 ? (
              <Step num={2} title={`Prep ${Math.min(3, oatMeals.length)} more oat jars`}
                detail="Same method as Sunday. Covers Thu, Fri, and Sat breakfasts. Check milk level while you're at it."/>
            ) : (
              <Step num={2} title="Breakfast check" detail="Check what's in the fridge for the second half of the week."/>
            )}

            <Step num={3} title="Defrost protein for Thu–Sun"
              detail="Move chicken or mince from the freezer to the fridge now. Takes 2 minutes today, saves 30 minutes of scrambling on Thursday night."/>

          </Section>

          {/* ── THIS WEEK'S DINNERS ── */}
          <Section icon="🍽" title="This Week's Dinners" bg="#C04040">
            {dinners.length === 0 ? (
              <NoneSelected label="dinners"/>
            ) : dinners.map((name, i) => {
              const meal = MEALS.find(m => m.name === name);
              if (!meal) return null;
              return (
                <div key={name} style={{ padding:"12px 0", borderBottom:"1px solid #F5F0E8" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
                    <span style={{fontSize:22}}>{meal.emoji}</span>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700, color:"#1E1E1E" }}>{meal.name}</div>
                      <div style={{ fontSize:11, color:"#888" }}>⏱ {meal.time} · Sam: {meal.calM} kcal {meal.protM}g · Luisa: {meal.calF} kcal {meal.protF}g</div>
                    </div>
                  </div>
                  <div style={{ fontSize:12, color:"#C04040", fontWeight:600, paddingLeft:32 }}>
                    Cook double → pack Luisa's + Sam's lunch containers before you sit down to eat
                  </div>
                </div>
              );
            })}
          </Section>

          {/* ── SMOOTHIES NOTE ── */}
          {smoothies.length > 0 && (
            <Section icon="🥤" title="Smoothies (no prep needed)" bg="#7A4A9A">
              <Tip text="Pre-bag dry ingredients Sunday (protein + oats + cocoa) into individual zip bags. Each smoothie takes 90 seconds — add milk and blend." />
              {smoothies.map(name => {
                const meal = MEALS.find(m => m.name === name);
                if (!meal) return null;
                return (
                  <div key={name} style={{ padding:"10px 0", borderBottom:"1px solid #F5F0E8",
                    display:"flex", alignItems:"center", gap:10 }}>
                    <span style={{fontSize:22}}>{meal.emoji}</span>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"#1E1E1E"}}>{meal.name}</div>
                      <div style={{fontSize:11,color:"#888"}}>{meal.ingF.slice(0,3).join(" · ")}</div>
                    </div>
                  </div>
                );
              })}
            </Section>
          )}

          {/* ── NIGHTLY REMINDER ── */}
          <div style={{ background:"#FEF3E2", border:"1px solid #F0D0A0", borderRadius:14,
            padding:"18px", marginBottom:16 }}>
            <div style={{ fontSize:10, letterSpacing:"0.2em", textTransform:"uppercase",
              fontWeight:700, color:"#C17A55", marginBottom:10 }}>Every dinner night</div>
            {["Cook the full double portion — Sam's larger serve + Luisa's smaller serve in the same pan.",
              "Plate your dinners. Then immediately pack the second portions into labelled containers.",
              "Into the fridge before you sit down. Non-negotiable — this is the system.",
              "Both lunches done. Zero decision-making tomorrow."
            ].map((step, i) => (
              <div key={i} style={{ display:"flex", gap:10, marginBottom:8, fontSize:13,
                color:"#444", lineHeight:1.6 }}>
                <span style={{ color:"#C17A55", fontWeight:700, flexShrink:0 }}>{i+1}.</span>
                {step}
              </div>
            ))}
          </div>

        </div>
      </div>
    );
  };

  // ── RENDER ─────────────────────────────────────────────────────────────
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100dvh",
      fontFamily:"'DM Sans','Helvetica Neue',sans-serif", background:"#FAF7F2",
      maxWidth:480, margin:"0 auto", position:"relative" }}>

      {/* STATUS BAR AREA */}
      <div style={{ background:"#1E1E1E", paddingTop:"env(safe-area-inset-top,0px)" }}/>

      {/* TOP BAR */}
      <div style={{ background:"#1E1E1E", padding:"12px 20px 10px",
        display:"flex", justifyContent:"space-between", alignItems:"center",
        flexShrink:0 }}>
        <div style={{ fontFamily:"Georgia,serif", fontSize:17, color:"white",
          display:"flex", alignItems:"center", gap:6 }}>
          <span>🍽</span>
          <span>Sam & Luisa</span>
        </div>
        {/* Person toggle */}
        <div style={{ display:"flex", background:"rgba(255,255,255,0.1)", borderRadius:8, overflow:"hidden" }}>
          {["Luisa","Sam"].map(p=>(
            <button key={p} onClick={()=>setPerson(p)} style={{
              padding:"5px 14px", border:"none", cursor:"pointer", fontSize:12, fontWeight:700,
              background:person===p?"#C17A55":"transparent",
              color:person===p?"white":"rgba(255,255,255,0.5)",
              transition:"all 0.15s"
            }}>{p}</button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
        {tab==="plan"     && <PlanTab/>}
        {tab==="recipes"  && <RecipesTab/>}
        {tab==="shopping" && <ShoppingTab/>}
        {tab==="prep"     && <PrepTab/>}
      </div>

      {/* BOTTOM NAV */}
      <div style={{ flexShrink:0, background:"white", borderTop:"1px solid #EDE8E0",
        display:"flex", paddingBottom:"env(safe-area-inset-bottom,0px)",
        boxShadow:"0 -4px 20px rgba(0,0,0,0.07)" }}>
        {[
          ["plan","📅","Plan"],
          ["recipes","📖","Recipes"],
          ["shopping","🛒",`Shop${checkedCount>0?` (${checkedCount})`:""}` ],
          ["prep","🧑‍🍳","Prep"]
        ].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            flex:1, padding:"11px 4px 10px", border:"none", cursor:"pointer",
            background:"transparent", display:"flex", flexDirection:"column",
            alignItems:"center", gap:3, transition:"all 0.15s"
          }}>
            <span style={{ fontSize:20, opacity:tab===id?1:0.45 }}>{icon}</span>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.08em",
              textTransform:"uppercase", color:tab===id?"#C17A55":"#AAA" }}>{label}</span>
            {tab===id && <div style={{ width:20, height:2, borderRadius:1, background:"#C17A55", marginTop:1 }}/>}
          </button>
        ))}
      </div>

      {/* MODALS */}
      <RecipeSheet meal={recipe} person={person} onClose={()=>setRecipe(null)}/>
      {picker && (
        <MealPicker day={picker.day} slot={picker.slot} person={person}
          onSelect={(name)=>setMeal(picker.day,picker.slot,name)}
          onClose={()=>setPicker(null)}/>
      )}
    </div>
  );
}

renderPlan();
renderRecipes();
</script>
</body>
</html>
